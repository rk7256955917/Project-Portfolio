<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Besley:ital@0;1&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap');
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family:'Bodoni Moda', serif;
            font-size: 1.2rem;
        }
        .container{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background:linear-gradient(to right,#041308,#0b3317);
        }
        .left-text {
            flex-basis: 30px;
            margin: 70px;
        }
        
        .heading {
            font-size: 3rem;
            color: rgb(240, 237, 237);
            text-align: center;
        }
        .subheading {
            margin-top: 10px;
             color: white;
            text-align: center;
        }
        .gallery {
            flex-basis: 50%;
        }
        .gallery {
            flex-basis: 50%;
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(3,1fr);
            grid-auto-rows: 120px;
        }
        .box {
            background-size: cover;
            background-position: top;
            color: rgb(248, 247, 247);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222;
            background-blend-mode: hard-light;
            transition: all 1s ease-in-out;
        }
        .row-2 {
            grid-row: span 2;
        }
        .col-2 {
            grid-column:span 2;
        }
        .box:hover {
            background-color:#999;
            background-position: center;
            box-shadow: 0 0 4px #fff;
        }
        @media (max-width:768px){

    .container{
        flex-direction: column;
        padding:20px;
        height:auto;
    }

}

    </style>
</head>
<body> 
    <div class="container">
        <div class="left-text">
        <h2 class="heading">MY Portfolio</h2>
        <p class="subheading">I design and develop responsive, interactive, and modern websites using HTML, CSS, JavaScript, and React.
Passionate about creating beautiful user interfaces and seamless web experiences.</p>
        </div>

    <div class="gallery">
        <div class="box row-2" id="box1" style="background-image: url(https://images.unsplash.com/photo-1549608276-5786777e6587?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGJpcmRzfGVufDB8fDB8fHww);">Hills</div>
        <div class="box col-2" style="background-image: url(https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bmF0dXJlfGVufDB8fDB8fHww);">waterfalls</div>
        <div class="box" style="background-image: url(https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fG5hdHVyZXxlbnwwfHwwfHx8MA%3D%3D);">Nature</div>
        <div class="box row-2" style="background-image: url(https://plus.unsplash.com/premium_photo-1673697239981-389164b7b87f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fG5hdHVyZXxlbnwwfHwwfHx8MA%3D%3D);">plants</div>
        <div class="box col-2" style="background-image: url(https://images.unsplash.com/photo-1501854140801-50d01698950b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fG5hdHVyZXxlbnwwfHwwfHx8MA%3D%3D);">Tree</div>
        <div class="box" style="background-image: url(https://images.unsplash.com/photo-1421789665209-c9b2a435e3dc?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fG5hdHVyZXxlbnwwfHwwfHx8MA%3D%3D);">Trees</div>
        <div class="box col-2" style="background-image: url(https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8YW5pbWFsc3xlbnwwfHwwfHx8MA%3D%3D);">Animals</div>
    </div>

</body>
</html>
